name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  brand-check:
    name: Brand Check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Brand Check gate
        run: ./scripts/brand-check.sh

      - name: Tests
        run: ./tests/run.sh
